<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IRL ROBOTICS</title>
  <meta name="description" content="IRL Robotics landing page" />

  <style>
    :root {
      --bg: #ffffff;
      --h-ink: #000000;
      --h-pixel: 6px;
      --h-blue: #1694e7;
      --h-red: #fc1052;
      --h-gap: 150px;
    }

    * {
      box-sizing: border-box;
      box-shadow: none !important;
      text-shadow: none !important;
      background-image: none !important;
      filter: none !important;
    }

  html, body {
  margin: 0;
  width: 100%;
  min-height: 100%;
  background: var(--bg);
  overflow-x: hidden;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 120px 0; /* scroll space */
}
    .h-widget {
      width: min(320px, 74vw);
      height: min(120px, 30vw);
      min-width: 200px;
      min-height: 84px;
      pointer-events: none;
    }

    .h-widget-inner {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .h-hands {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--h-gap);
      transform: translateY(-20px);
    }

    .h-hand {
      position: relative;
      width: calc(var(--h-pixel) * 10);
      height: calc(var(--h-pixel) * 16);
      animation: h-breathe 1.4s ease-in-out infinite;
      flex: 0 0 auto;
    }

    .h-hand.left {
      --h-flip: 1;
    }

    .h-hand.right {
      --h-flip: -1;
      transform: scaleX(-1);
    }

    .h-px {
      position: absolute;
      width: var(--h-pixel);
      height: var(--h-pixel);
      background: var(--h-ink);
    }

    .h-blue { background: var(--h-blue); }
    .h-red { background: var(--h-red); }

    @keyframes h-breathe {
      0%, 100% { transform: translateY(0px) scaleX(var(--h-flip, 1)); }
      50% { transform: translateY(-14px) scaleX(var(--h-flip, 1)); }
    }

   @media (max-width: 560px) {
  :root {
    --h-pixel: 4px;     /* slightly smaller hands */
    --h-gap: 80px;      /* 🔥 enough space so they NEVER overlap */
  }

  .h-widget {
    width: 100%;
    height: auto;
  }
}
  .h-widget {
    width: 100vw;
    height: auto;
    min-width: 0;
    min-height: 0;
  }

  .h-hand {
    transform: scale(0.85); /* extra shrink to prevent overlap */
  }

  .h-hand.right {
    transform: scaleX(-1) scale(0.85);
  }
}
  </style>
</head>
