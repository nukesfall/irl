<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>IRL Robotics</title>
  <meta name="description" content="Train robots. Get paid." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255,255,255,.7);
      --border: rgba(255,255,255,.12);
      --modal-bg: #0b0d10;
      --input-bg: #111;
      --focus-glow: 0 0 0 3px rgba(59, 130, 246, 0.15);
      --site-padding: 24px;
      --topbar-height: 72px;
      --menu-size: 48px;
      --tight-gap: 14px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      position: relative;
      text-align: left;
    }

    #particles-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .site-shell {
      padding: 0 var(--site-padding);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .logo img {
      height: var(--menu-size);
    }

    .menu-button {
      width: var(--menu-size);
      height: var(--menu-size);
      border-radius: 14px;
      border: 1px solid var(--border);
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .hamburger {
      width: 18px;
      height: 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .hamburger span {
      height: 2px;
      background: #fff;
    }

    .menu-panel {
      position: absolute;
      right: 24px;
      top: 80px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
      opacity: 0;
      pointer-events: none;
    }

    .menu-panel.active {
      opacity: 1;
      pointer-events: auto;
    }

    .menu-item {
      display: block;
      width: 100%;
      padding: 10px;
      background: none;
      border: none;
      color: white;
      text-align: left;
      cursor: pointer;
    }

    .hero {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-height: calc(100vh - var(--topbar-height) - 80px);
      padding-top: 6vh;
    }

    .hero-copy {
      max-width: 600px;
    }

    h1 {
      font-size: clamp(34px, 6vw, 64px);
      margin-bottom: 10px;
    }

    .sub {
      margin-bottom: var(--tight-gap);
      color: var(--muted);
    }

    .cta-row {
      display: flex;
      gap: var(--tight-gap);
    }

    .btn {
      padding: 14px 28px;
      border-radius: 12px;
      background: #111;
      border: 1px solid var(--border);
      color: white;
      cursor: pointer;
    }

    footer {
      margin-top: auto;
      padding: 16px var(--site-padding);
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-box {
      background: var(--modal-bg);
      padding: 30px;
      border-radius: 14px;
      width: 90%;
      max-width: 400px;
    }

    .input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      color: white;
    }

    .submit {
      width: 100%;
      padding: 12px;
      background: white;
      color: black;
      border: none;
      cursor: pointer;
    }

    .close {
      float: right;
      cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="page">
  <div class="site-shell">

    <div class="topbar">
      <div class="logo">
        <img src="logo.png">
      </div>

      <div>
        <div class="menu-button" onclick="toggleMenu()">
          <div class="hamburger">
            <span></span><span></span><span></span>
          </div>
        </div>

        <div class="menu-panel" id="menuPanel">
          <button class="menu-item" onclick="openAbout()">About</button>
          <button class="menu-item" onclick="openContact()">Contact</button>
        </div>
      </div>
    </div>

    <div class="hero">
      <div class="hero-copy">
        <h1>Train Robots.<br>Get Paid.</h1>
        <div class="sub">In-Real-life.</div>

        <div class="cta-row">
          <button class="btn" onclick="openModal()">Apply for IRL</button>
          <button class="btn" onclick="openRequestModal()">Request Data</button>
        </div>
      </div>
    </div>

  </div>

  <footer>
    <div>© <span id="y"></span> IRL™ Robotics</div>
    <div onclick="openContact()" style="cursor:pointer;">Contact</div>
  </footer>
</div>

<!-- MODALS -->
<div class="modal" id="modal">
  <div class="modal-box" id="formBox">
    <div class="close" onclick="closeModal()">×</div>
    <form id="waitlistForm">
      <input class="input" name="first" placeholder="First Name">
      <input class="input" name="last" placeholder="Last Name">
      <input class="input" name="email" placeholder="Email">
      <button class="submit">Apply</button>
    </form>
  </div>
</div>

<div class="modal" id="requestModal">
  <div class="modal-box" id="requestFormBox">
    <div class="close" onclick="closeRequestModal()">×</div>
    <form id="requestDataForm">
      <input class="input" name="name" placeholder="Name">
      <input class="input" name="company" placeholder="Company">
      <input class="input" name="email" placeholder="Email">
      <textarea class="input" name="message"></textarea>
      <button class="submit">Submit</button>
    </form>
  </div>
</div>

<div class="modal" id="contactModal">
  <div class="modal-box">
    <div class="close" onclick="closeContact()">×</div>
    contact@irl.bot
  </div>
</div>

<div class="modal" id="aboutModal">
  <div class="modal-box">
    <div class="close" onclick="closeAbout()">×</div>
    IRL is busy collecting Human data for Humanoid Robots in-real-life.
  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("menuPanel").classList.toggle("active");
}

function openModal(){modal.classList.add("active")}
function closeModal(){modal.classList.remove("active")}
function openRequestModal(){requestModal.classList.add("active")}
function closeRequestModal(){requestModal.classList.remove("active")}
function openContact(){contactModal.classList.add("active")}
function closeContact(){contactModal.classList.remove("active")}
function openAbout(){aboutModal.classList.add("active")}
function closeAbout(){aboutModal.classList.remove("active")}

document.getElementById("y").textContent=new Date().getFullYear();
</script>

</body>
</html>
