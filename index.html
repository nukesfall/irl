<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="IRL — In Real Life™ Robotics. Coming 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F7F7F4;
      --text: #111111;
      --muted: #555555;
      --pill-bg: rgba(255, 255, 255, 0.7);
      --shadow-soft: 0 18px 45px rgba(15,15,15,0.08);
      --radius-pill: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      padding: 12px;
      background: linear-gradient(to bottom, rgba(247,247,244,0.9), rgba(247,247,244,0));
    }

    /* FULL-WIDTH BRAND BAR */
    .brand-bar {
      width: calc(100% - 24px);
      margin: 0 auto;
      padding: 12px 20px;
      border-radius: var(--radius-pill);
      background: var(--pill-bg);
      border: 1px solid rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: flex-start; /* LEFT aligned */
      box-shadow: 0 10px 30px rgba(0,0,0,0.04);
    }

    .brand-mark {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #2F4BFF;
      flex-shrink: 0;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      line-height: 1.15;
      text-align: left; /* ensures left alignment */
    }

    .brand-text-main {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .brand-text-sub {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0 60px;
    }

    .hero-inner {
      text-align: center;
      padding: 40px 0;
    }

    .hero-note {
      font-size: 18px;
      color: var(--muted);
    }

    footer {
      border-top: 1px solid rgba(0,0,0,0.06);
      padding: 18px 0;
      font-size: 11px;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>

<body>
<div class="page">

  <header>
    <div class="brand-bar">
      <span class="brand-mark"></span>
      <div class="brand-text">
        <div class="brand-text-main">IRL</div>
        <div class="brand-text-sub">In Real Life™ Robotics</div>
      </div>
    </div>
  </header>

  <main>
    <div class="hero-inner">
      <p class="hero-note">Launching 2026</p>
    </div>
  </main>

  <footer>
    © <span id="year"></span> In Real Life™
  </footer>

</div>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>

</body>
</html>
