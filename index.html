<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>In Real Life</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    /* Global Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Layout */
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f7f5f2; 
      color: #000;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-bottom: 60px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    /* Main Content */
    .content {
      max-width: 900px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-grow: 1;
      position: relative;
      z-index: 2;
    }

    /* Logo Container */
    .logo-container img {
      width: 235px;
      height: auto;
      opacity: 0;
      animation: fadeIn 2s ease-out forwards;
    }

    /* Fade-in Animation */
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Footer */
    footer {
      font-size: 0.875rem;
      color: #000000;
      padding: 15px 0;
      text-align: center;
      width: 100%;
      position: fixed;
      bottom: 0;
      left: 0;
      z-index: 3;
    }

    footer a {
      color: #000000;
      text-decoration: none;
      font-weight: bold;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Mobile tweaks */
    @media (max-width: 768px) {
      .logo-container img {
        width: 187.5px;
      }
    }
  </style>
</head>

<body>

  <div class="content">
    <div class="logo-container">
      <!-- IMPORTANT: This must match the exact filename, including capitalization -->
      <img id="logo" src="Logo.png" alt="IRL Logo" onerror="this.classList.add('error')">
    </div>
  </div>

  <footer>
    <p>© 2025 <a href="https://www.irl.bot" target="_blank">In Real Life</a>. All Rights Reserved.</p>
  </footer>

  <script>
    const logo = document.getElementById('logo');
    logo.addEventListener('load', () => {
      logo.style.opacity = 1;
    });
  </script>

</body>
</html>
