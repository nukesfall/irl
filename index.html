<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IRL</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="IRL — In Real Life™ Robotics. Coming 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #F7F7F4;
      --text: #111111;
      --muted: #555555;
      --pill-bg: rgba(255, 255, 255, 0.7);
      --shadow-soft: 0 18px 45px rgba(15, 15, 15, 0.08);
      --radius-pill: 999px;
      --max-width: 960px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .shell {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding-inline: 24px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: linear-gradient(to bottom, rgba(247, 247, 244, 0.9), rgba(247, 247, 244, 0));
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0 14px;
    }

    .brand-pill {
      padding: 8px 16px;
      border-radius: var(--radius-pill);
      background: var(--pill-bg);
      border: 1px solid rgba(0, 0, 0, 0.05);
      display: inline-flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    .brand-mark {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #2F4BFF;
    }

    .brand-text-main {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 500;
    }

    .brand-text-sub {
      font-size: 11px;
      color: var(--muted);
      opacity: 0.9;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .hero {
      width: 100%;
      padding: 40px 0 72px;
    }

    .hero-inner {
      text-align: center;
      padding-top: 32px;
      padding-bottom: 32px;
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: var(--radius-pill);
      background: var(--pill-bg);
      border: 1px solid rgba(0, 0, 0, 0.04);
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(40px, 5vw, 60px);
      line-height: 1.02;
      letter-spacing: -0.03em;
      font-weight: 500;
      margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .hero-note {
      font-size: 13px;
      color: var(--muted);
      margin-top: 10px;
    }

    footer {
      border-top: 1px solid rgba(0,0,0,0.06);
      padding: 18px 0 24px;
      font-size: 11px;
      color: var(--muted);
    }

    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    @media (max-width: 640px) {
      .hero {
        padding-top: 24px;
      }
      .hero-title {
        font-size: 32px;
      }
      .hero-sub {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="shell">
      <nav class="nav" aria-label="Primary">
        <div class="brand-pill">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <div class="brand-text-main">IRL</div>
            <div class="brand-text-sub">In Real Life™</div>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="shell">
        <div class="hero-inner">
          
          <p class="hero-note">
            Coming&nbsp;2026.
          </p>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="shell">
      <div class="footer-inner">
        © <span id="year"></span>-In Real Life™
      </div>
    </div>
  </footer>
</div>

<script>
  document.getElementById("year").textContent = new Date().getFullYear();
</script>
</body>
</html>
