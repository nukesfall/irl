<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>IRL Robotics</title>
  <meta name="description" content="Train robots. Get paid." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255,255,255,.7);
      --card: rgba(11,13,16,0.4); /* semi-transparent dark for glass */
      --border: rgba(255,255,255,.12);
      --glow: rgba(59, 130, 246, 0.18);
      --blur: 16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height: 100%;
      min-height: 100vh;
      margin: 0;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: auto;
    }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #particles-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
      overscroll-behavior: none;
      touch-action: none;
    }
    .container {
      padding: 24px;
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo img {
      width: clamp(320px, 90vh, 90vh);
      max-width: 100vw;
      margin-bottom: clamp(20px, 4vw, 32px);
      display: block;
    }
    .glass-panel {
      background: var(--card);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 540px;
      box-shadow: 
        0 8px 32px rgba(0,0,0,0.4),
        inset 0 0 20px var(--glow);
      text-align: center;
      margin-top: 16px;
    }
    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 600;
      line-height: 1.1;
      background: linear-gradient(to bottom, #ffffff 0%, #cccccc 40%, #999999 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .cta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .btn {
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      background: #111;
      color: #fff;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: .2s ease;
    }
    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.35);
    }
    .limited-access {
      font-size: 13px;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.3px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: .25s ease;
      z-index: 10;
    }
    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-box {
      background: var(--card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      text-align: left;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .modal-box h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }
    .input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 16px;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.6);
      box-shadow: var(--focus-glow);
    }
    .submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
      cursor: pointer;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 20px;
      cursor: pointer;
    }
    .success {
      text-align: center;
      font-size: 16px;
      line-height: 1.4;
      color: #10b981;
    }
    .error {
      color: #ef4444;
      margin-top: 12px;
      font-size: 14px;
    }
    footer {
      position: absolute;
      bottom: 16px;
      width: 100%;
      font-size: 12px;
      color: var(--muted);
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <div class="container">
    <div class="logo">
      <img src="logo.png" alt="IRL Robotics">
    </div>

    <div class="glass-panel">
      <h1>Train Robots.<br>Get Paid.</h1>
      <p class="sub">Real tasks. Real data. Real life.</p>
      <div class="cta">
        <button class="btn" onclick="openModal()">Apply for IRL</button>
        <div class="limited-access">Limited early access</div>
      </div>
    </div>
  </div>

  <!-- MODAL (also glass-themed) -->
  <div class="modal" id="modal">
    <div class="modal-box" id="formBox">
      <div class="close" onclick="closeModal()">×</div>
      <h2>Join the IRL Waitlist</h2>
      <form id="waitlistForm" method="POST">
        <input class="input" name="first" placeholder="First Name" required>
        <input class="input" name="last" placeholder="Last Name" required>
        <input class="input" name="email" type="email" placeholder="Email Address" required>
        <input class="input" name="ref" placeholder="How did you hear about IRL?">
        <button type="submit" class="submit">Apply</button>
      </form>
    </div>
  </div>

  <footer>
    © <span id="y"></span> IRL Robotics
  </footer>

  <script>
    // Particles – independent, no reaction to scroll/pull/touch
    const canvas = document.getElementById('particles-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    const particleCount = 40;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      initParticles();
    });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 1 + 0.5;
        this.speedX = Math.random() * 0.2 - 0.1;
        this.speedY = Math.random() * 0.2 - 0.1;
        this.opacity = Math.random() * 0.25 + 0.1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(240, 245, 255, ${this.opacity})`;
        ctx.shadowBlur = 6;
        ctx.shadowColor = 'rgba(200, 220, 255, 0.25)';
        ctx.fill();
      }
    }

    function initParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) particles.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animate);
    }

    initParticles();
    animate();

    // Form + modal logic with debug
    const modal = document.getElementById("modal");
    const formBox = document.getElementById("formBox");
    const form = document.getElementById("waitlistForm");
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZLSaASNHj946UdOr-AY_1S1r-QkulDFFKgN4ulh0OmhNP78QYrwCzqVa-XEd1lSHvTA/exec";

    function openModal() { modal.classList.add("active"); }
    function closeModal() { modal.classList.remove("active"); }

    form.addEventListener("submit", async function(e) {
      e.preventDefault();
      const formData = new FormData(form);
      try {
        const response = await fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: formData });
        const text = await response.text();
        console.log("Submission status:", response.status);
        console.log("Response body:", text);
        if (response.ok) {
          formBox.innerHTML = `
            <div class="success">
              <h2>You're in.</h2>
              <p>Thanks for applying to IRL.<br>We’ll be in touch soon.</p>
            </div>
          `;
        } else {
          throw new Error(`Status ${response.status}: ${text.substring(0, 200)}...`);
        }
      } catch (err) {
        console.error("Submission error:", err);
        formBox.innerHTML += `<p class="error">Something went wrong (${err.message}) — try again or email hey@irl.bot directly.</p>`;
      }
    });

    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
