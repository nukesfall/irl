<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />
  <title>IRL Robotics</title>
  <meta name="description" content="Train robots. Get paid." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --muted: rgba(255,255,255,.7);
      --border: rgba(255,255,255,.12);
      --separator-glow: rgba(59, 130, 246, 0.15);
      --modal-bg: #0b0d10;
      --input-bg: #111;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height: 100%;
      min-height: 100vh;
      margin: 0;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: auto;
    }
    body {
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-y: auto;
      overflow-x: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    #particles-canvas {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
      overscroll-behavior: none;
      touch-action: none;
    }
    .container {
      padding: 24px;
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .logo img {
      width: clamp(180px, 40vw, 280px);
      display: block;
      margin-bottom: clamp(24px, 5vw, 40px);
    }
    .separator {
      width: 120px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
      box-shadow: 0 0 12px var(--separator-glow);
      margin: clamp(12px, 3vw, 20px) auto;
      border: none;
    }
    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 600;
      line-height: 1.1;
      background: linear-gradient(to bottom, #ffffff 0%, #cccccc 40%, #999999 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      margin-bottom: 12px;
    }
    .sub {
      font-size: 18px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .cta-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .cta {
      display: flex;
      flex-direction: row;
      gap: 12px;
      justify-content: center;
      width: 100%;
    }
    .btn {
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      background: #111;
      color: #fff;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: .2s ease;
      white-space: nowrap;
    }
    .btn:hover {
      transform: translateY(-2px);
      border-color: rgba(255,255,255,.35);
    }
    .limited-access {
      font-size: 13px;
      color: var(--muted);
      margin-top: 12px;
    }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: .25s ease;
      z-index: 10;
    }
    .modal.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-box {
      background: var(--modal-bg);
      padding: 30px;
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      text-align: left;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      position: relative;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-box h2 {
      margin-bottom: 16px;
      font-size: 20px;
    }
    .input, textarea.input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      font-family: Inter, system-ui, sans-serif;
    }
    textarea.input {
      min-height: 100px;
    }
    .submit {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: var(--text);
      color: var(--bg);
      font-weight: 600;
      cursor: pointer;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 24px;
      font-size: 20px;
      cursor: pointer;
    }
    .success { text-align:center; color:#10b981; }
    .error { color:#ef4444; margin-top:12px; }
    footer {
      position: absolute;
      bottom: 16px;
      width: 100%;
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 640px) {
      .btn {
        flex: 1;
        padding: 16px 18px;
      }
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="container">
  <div class="logo">
    <img src="logo.png" alt="IRL Robotics">
  </div>

  <hr class="separator">

  <h1>Train Robots.<br>Get Paid.</h1>
  <p class="sub">In-Real-life.</p>

  <div class="cta-wrap">
    <div class="cta">
      <button class="btn" onclick="openModal()">Apply for IRL</button>
      <button class="btn" onclick="openRequestModal()">Request Data</button>
    </div>
    <div class="limited-access">Limited early access</div>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-box" id="formBox">
    <div class="close" onclick="closeModal()">×</div>
    <h2>Join the IRL Waitlist</h2>
    <form id="waitlistForm">
      <input class="input" name="first" placeholder="First Name" required>
      <input class="input" name="last" placeholder="Last Name" required>
      <input class="input" name="email" type="email" placeholder="Email Address" required>
      <input class="input" name="ref" placeholder="How did you hear about IRL?">
      <button type="submit" class="submit">Apply</button>
    </form>
  </div>
</div>

<div class="modal" id="requestModal">
  <div class="modal-box" id="requestFormBox">
    <div class="close" onclick="closeRequestModal()">×</div>
    <h2>Request Data</h2>
    <form id="requestDataForm">
      <input class="input" name="first_name" placeholder="First Name" required>
      <input class="input" name="last_name" placeholder="Last Name" required>
      <input class="input" name="how_heard" placeholder="How did you hear about IRL?" required>
      <textarea class="input" name="type_of_data" placeholder="Kind of data you need" required></textarea>
      <input class="input" name="data_preference" placeholder="How would you like it delivered?" required>
      <input class="input" name="email" type="email" placeholder="Email for contact" required>
      <button type="submit" class="submit">Submit Request</button>
    </form>
  </div>
</div>

<footer>
  © <span id="y"></span> IRL™ Robotics
</footer>

<script>
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
let particles = [];

class Particle {
  constructor() {
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.size = Math.random()*1 + 0.5;
    this.speedX = Math.random()*0.2 - 0.1;
    this.speedY = Math.random()*0.2 - 0.1;
    this.opacity = Math.random()*0.28 + 0.12;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(245,248,255,${this.opacity})`;
    ctx.shadowBlur=8;
    ctx.shadowColor='rgba(210,230,255,0.3)';
    ctx.fill();
  }
}

function initParticles(){
  particles=[];
  for(let i=0;i<40;i++)particles.push(new Particle());
}
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p=>{p.update();p.draw();});
  requestAnimationFrame(animate);
}
initParticles();animate();

const modal = document.getElementById("modal");
const requestModal = document.getElementById("requestModal");

function openModal(){modal.classList.add("active")}
function closeModal(){modal.classList.remove("active")}
function openRequestModal(){requestModal.classList.add("active")}
function closeRequestModal(){requestModal.classList.remove("active")}

document.getElementById("y").textContent=new Date().getFullYear();
</script>

</body>
</html>
